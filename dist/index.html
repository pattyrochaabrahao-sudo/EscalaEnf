<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Escalas de Enfermagem</title>
    <script type="module" crossorigin src="/assets/index-DRf1knT2.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-8jyNJ2U2.css">
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;width:100vw;height:100vh;overflow:auto;"><h1>APP CRASH</h1><pre>' + message + '\n' + (error && error.stack) + '</pre></div>';
      };
      window.onunhandledrejection = function(event) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:fixed;top:0;left:0;background:white;padding:20px;width:100vw;height:100vh;overflow:auto;"><h1>PROMISE REJECTION</h1><pre>' + event.reason + '</pre></div>';
      };
    </script>
    <div id="root"></div>
  </body>
</html>
